server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline' blob: https://connect.facebook.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' blob: https: wss: ws:; frame-src 'self' https://*.facebook.com; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

    # The current CRM backend image does not expose /api/v1/campaigns yet, but
    # the frontend still renders the campaigns page and expects a campaigns
    # array in the initial response. Return an empty collection instead of
    # letting the page crash on `r.campaigns.length`.
    location ^~ /undefined/api/v1/campaigns {
        default_type application/json;
        return 200 '{"campaigns":[],"meta":{"page":1,"per_page":20,"count":0,"total_count":0}}';
    }

    location ^~ /undefined/api/ {
        proxy_pass http://evo_gateway:3030/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /widget {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /widget/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
