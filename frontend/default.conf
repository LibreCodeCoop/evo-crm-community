server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline' blob: https://connect.facebook.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' blob: https: wss: ws:; frame-src 'self' https://*.facebook.com; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

    # The current CRM backend image does not expose /api/v1/campaigns yet, but
    # the frontend still renders the campaigns page and expects the list
    # response shape returned by the API client: `{ data: [], meta: { pagination
    # ... } }`. Return an empty collection with pagination metadata instead of
    # letting the page crash on `r.campaigns.length`.
    location ^~ /undefined/api/v1/campaigns {
        default_type application/json;
        return 200 '{"data":[],"meta":{"pagination":{"page":1,"page_size":20,"total":0,"total_pages":0,"has_next_page":false,"has_previous_page":false}}}';
    }

    location ^~ /api/v1/campaigns {
        default_type application/json;
        return 200 '{"data":[],"meta":{"pagination":{"page":1,"page_size":20,"total":0,"total_pages":0,"has_next_page":false,"has_previous_page":false}}}';
    }

    # Journeys are served by a small local mock service so creates are visible
    # immediately in the list and persist across requests in this stack.
    location ^~ /undefined/api/v1/journeys {
        proxy_pass http://evo_journeys_mock:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /api/v1/journeys {
        proxy_pass http://evo_journeys_mock:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /settings/segments/undefined/api/ {
        proxy_pass http://evo_segments_mock:8091/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /settings/segments/api/ {
        proxy_pass http://evo_segments_mock:8091/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # The segment builder uses relative URLs under /settings/segments and under
    # nested journey pages, so route any segments API call to the local mock.
    location ~ /api/v1/segments {
        proxy_pass http://evo_segments_mock:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /undefined/api/ {
        proxy_pass http://evo_gateway:3030/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /widget {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /widget/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
